<!doctype html>
<html class="no-js" lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="x-ua-compatible" content="ie=edge">
<title>Change Password - TOP EDU</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=0">
<link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico">
<link rel="stylesheet" href="css/bootstrap.min.css">
<link rel="stylesheet" href="css/font-awesome.min.css">
<link rel="stylesheet" href="css/meanmenu.min.css">
<link rel="stylesheet" href="css/animate.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="css/color.css">
<link rel="stylesheet" href="css/responsive.css">
<script src="js/vendor/modernizr-2.8.3.min.js"></script>
</head>
<body data-require-auth="true">
<div class="as-mainwrapper">
  <div class="bg-white">
    <div class="contact-area section-padding">
      <div class="container">
        <div class="row">
          <div class="col-md-6 col-md-offset-3">
            <div class="contact-form">
              <div class="single-title">
                <h3>Change Password</h3>
              </div>
              <form id="change-password-form">
                <div class="form-container">
                  <input id="current-password" type="password" placeholder="Current Password" required>
                  <input id="new-password" type="password" placeholder="New Password" required>
                  <input id="confirm-new-password" type="password" placeholder="Confirm New Password" required>
                </div>
                <button type="submit" class="button-default">Update Password</button>
              </form>
              <p id="auth-message" class="form-messege" style="margin-top: 15px;"></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="js/vendor/jquery-1.12.4.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/jquery.meanmenu.js"></script>
<script src="js/wow.min.js"></script>
<script src="js/jquery.scrollUp.min.js"></script>
<script src="js/plugins.js"></script>
<script src="js/styleswitch.js"></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
</body>
</html>
