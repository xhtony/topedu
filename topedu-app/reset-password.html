                        <div class="contact-form">
                            <div class="single-title">
                                <h3>Reset Password</h3>
                            </div>
                            <form id="reset-password-form">
                                <div class="form-container">
                                    <input id="reset-password-email" type="email" placeholder="Email" required>
                                    <input id="reset-password-new" type="password" placeholder="New password" minlength="8" required>
                                    <input id="reset-password-confirm" type="password" placeholder="Confirm password" minlength="8" required>
                                    <div style="display:flex;gap:10px;">
                                        <input id="reset-password-code" type="text" placeholder="Verification code" maxlength="6" required style="flex:1;">
                                        <button id="reset-password-send-code-btn" type="button" class="button-default" style="padding: 0 14px; height: 44px; position: relative; z-index: 6;">Get code</button>
                                    </div>
                                </div>
                                <button type="submit" class="button-default">Reset Password</button>
                            </form>

                            <p id="auth-message" class="form-messege" style="margin-top: 15px;"></p>
                            <p style="margin-top: 20px;">
